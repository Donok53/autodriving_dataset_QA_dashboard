services:
  - type: web
    name: autodriving-sensor-qa-dashboard
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      - key: MAX_UPLOAD_SIZE_LABEL
        value: "100MB"
      - key: MAX_ACTIVE_UPLOAD_BYTES
        value: "314572800"
      - key: MAX_ACTIVE_UPLOAD_SIZE_LABEL
        value: "300MB"
      - key: ALLOW_LOCAL_UNLIMITED_UPLOADS
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: GITHUB_ISSUE_REPOSITORY
        value: "Donok53/autodriving_dataset_QA_dashboard"
      - key: GITHUB_ISSUE_LABELS
        value: "bug"
      - key: AUTO_ISSUE_COOLDOWN_SECONDS
        value: "3600"
      - key: AUTO_ISSUE_MAX_PER_RUNTIME
        value: "5"
